<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AXION PLAY</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<script src="https://unpkg.com/ethers@6.7.0/dist/ethers.umd.min.js"></script>
<script src="https://unpkg.com/@walletconnect/ethereum-provider@2.10.1/dist/index.umd.js"></script>

<style>
/* BACKGROUND GAME STYLE */
body{
  margin:0;
  font-family:'Inter',sans-serif;
  color:white;
  overflow:hidden;

  background:
    radial-gradient(circle at 20% 20%, rgba(0,255,255,0.15), transparent 30%),
    radial-gradient(circle at 80% 30%, rgba(162,89,255,0.18), transparent 30%),
    linear-gradient(180deg,#050816,#02040d);
}

body::before{
  content:"";
  position:fixed;
  inset:0;
  background:
    linear-gradient(rgba(0,255,255,0.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,255,255,0.05) 1px, transparent 1px);
  background-size:40px 40px;
  animation:gridMove 10s linear infinite;
}

@keyframes gridMove{
  from{transform:translateY(0)}
  to{transform:translateY(40px)}
}

.stars{
  position:fixed;
  inset:0;
  background-image:
    radial-gradient(2px 2px at 10% 20%, white, transparent),
    radial-gradient(1px 1px at 50% 60%, cyan, transparent),
    radial-gradient(2px 2px at 80% 40%, violet, transparent);
  opacity:.4;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  padding:15px 20px;
  border-bottom:1px solid rgba(255,255,255,.1);
  backdrop-filter:blur(10px);
}

.logo{
  display:flex;
  align-items:center;
  gap:10px;
}

.logo img{width:40px}

.wallet{
  display:flex;
  align-items:center;
  gap:10px;
}

button{
  padding:10px 15px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:700;
}

.connect{background:linear-gradient(135deg,#00eaff,#5b6cff)}
.disconnect{background:#ff4d6d;color:white}

/* GAME */
.container{
  text-align:center;
  margin-top:40px;
}

#target{
  width:120px;
  height:120px;
  margin:40px auto;
  border-radius:50%;
  background:linear-gradient(135deg,#00eaff,#a259ff);
  display:none;
  box-shadow:0 0 30px cyan;
}

#target.show{display:block}

.bar{
  width:80%;
  height:20px;
  margin:20px auto;
  background:#222;
  border-radius:10px;
  overflow:hidden;
}

.marker{
  width:10px;
  height:100%;
  background:white;
  position:relative;
  left:0%;
}

.actions{margin-top:20px}

.status{
  margin-top:20px;
  font-size:18px;
}
</style>
</head>

<body>

<div class="stars"></div>

<div class="header">
  <div class="logo">
    <img src="https://raw.githubusercontent.com/axionteam645/axion-dashboard/main/axion-logo.png">
    <strong>AXION PLAY</strong>
  </div>

  <div class="wallet">
    <span id="walletAddress">Not Connected</span>
    <button id="connectBtn" class="connect">Connect</button>
  </div>
</div>

<div class="container">

  <h1>AXION HAMMER</h1>
  <div class="status" id="status">Connect wallet to play</div>

  <div id="target"></div>

  <div class="bar">
    <div class="marker" id="marker"></div>
  </div>

  <div class="actions">
    <button onclick="startRound()">Start</button>
    <button onclick="hit()">HIT</button>
  </div>

</div>

<script>
let provider, signer, address;
let connected=false;

/* WALLET */
const connectBtn=document.getElementById("connectBtn");
const walletText=document.getElementById("walletAddress");

connectBtn.onclick=async()=>{
  if(!connected){
    try{
      if(window.ethereum){
        provider=new ethers.BrowserProvider(window.ethereum);
        await provider.send("eth_requestAccounts",[]);
      }else{
        provider=await window.EthereumProvider.init({
          projectId:"44e7b575eead4c444613bf481554ba7d",
          chains:[56],
          showQrModal:true
        });
        await provider.enable();
        provider=new ethers.BrowserProvider(provider);
      }

      signer=await provider.getSigner();
      address=await signer.getAddress();

      walletText.innerText=address.slice(0,6)+"..."+address.slice(-4);
      connectBtn.innerText="Disconnect";
      connectBtn.className="disconnect";
      connected=true;

      document.getElementById("status").innerText="Wallet Connected ✔";

    }catch(e){
      alert("Connection failed");
    }
  }else{
    connected=false;
    walletText.innerText="Not Connected";
    connectBtn.innerText="Connect";
    connectBtn.className="connect";
  }
};

/* GAME */
let pos=0;
let dir=1;
let running=false;

function animate(){
  if(!running) return;
  pos+=dir*2;

  if(pos>100){dir=-1}
  if(pos<0){dir=1}

  document.getElementById("marker").style.left=pos+"%";
  requestAnimationFrame(animate);
}

function startRound(){
  if(!connected){
    alert("Connect wallet first");
    return;
  }

  running=true;
  animate();

  setTimeout(()=>{
    document.getElementById("target").classList.add("show");

    setTimeout(()=>{
      document.getElementById("target").classList.remove("show");
      running=false;
    },1500);

  },800);
}

function hit(){
  if(!running){
    document.getElementById("status").innerText="Miss ❌";
    return;
  }

  running=false;

  let result;

  if(pos<20){
    result="Bad ❌";
  }else if(pos<50){
    result="Good ✔";
  }else if(pos<80){
    result="Strong 🔥";
  }else{
    result="CRITICAL 💥";
  }

  document.getElementById("status").innerText=result;
}
</script>

</body>
</html>
