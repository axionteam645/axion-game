<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AXION Craft V2</title>
<style>
body { margin:0; overflow:hidden; font-family:Arial; background:#050816; color:#fff;}
canvas { display:block; }

#menu {
position:absolute; inset:0; display:flex; justify-content:center; align-items:center; flex-direction:column;
background:#050816;
}

button {
padding:15px 30px;
font-size:18px;
cursor:pointer;
background:#0ff;
border:none;
border-radius:10px;
}

#hud {
position:absolute; inset:0; display:none;
}

#crosshair {
position:absolute; left:50%; top:50%;
width:20px; height:20px;
transform:translate(-50%,-50%);
}

#crosshair:before, #crosshair:after {
content:""; position:absolute; background:#fff;
}

#crosshair:before { width:2px; height:20px; left:9px;}
#crosshair:after { height:2px; width:20px; top:9px;}

.panel {
position:absolute;
background:rgba(0,0,0,0.5);
padding:10px;
border-radius:10px;
}

#info { top:10px; left:10px;}
#inventory { top:10px; right:10px;}
</style>
</head>
<body>

<div id="menu">
<h1>AXION CRAFT</h1>
<button id="start">START</button>
</div>

<div id="hud">
<div id="crosshair"></div>

<div id="info" class="panel">
Blocks: <span id="blocks">0</span><br>
Enemies: <span id="enemy">0</span>
</div>

<div id="inventory" class="panel">
Wood: <span id="wood">0</span><br>
Stone: <span id="stone">0</span><br>
Crystal: <span id="crystal">0</span>
</div>
</div>

<script type="module">
import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";
import { PointerLockControls } from "https://unpkg.com/three@0.160.0/examples/jsm/controls/PointerLockControls.js";

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,1000);
camera.position.set(0,3,5);

const renderer = new THREE.WebGLRenderer();
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

const controls = new PointerLockControls(camera,document.body);
scene.add(controls.getObject());

document.getElementById("start").onclick=()=>controls.lock();
controls.addEventListener("lock",()=>{
menu.style.display="none";
hud.style.display="block";
});

const light=new THREE.HemisphereLight(0xffffff,0x444444,1.2);
scene.add(light);

const boxGeo=new THREE.BoxGeometry(1,1,1);
const world=new Map();

function add(x,y,z,color){
const mesh=new THREE.Mesh(boxGeo,new THREE.MeshStandardMaterial({color}));
mesh.position.set(x,y,z);
scene.add(mesh);
world.set(`${x},${y},${z}`,mesh);
}

for(let x=-10;x<10;x++){
for(let z=-10;z<10;z++){
add(x,0,z,0x228B22);
if(Math.random()<0.1) add(x,1,z,0x888888);
if(Math.random()<0.05) add(x,1,z,0x00ffff);
}
}

let inv={wood:0,stone:0,crystal:0};

const ray=new THREE.Raycaster();
window.addEventListener("click",()=>{
ray.setFromCamera({x:0,y:0},camera);
const hit=ray.intersectObjects([...world.values()])[0];
if(!hit) return;

const p=hit.object.position;
scene.remove(hit.object);
world.delete(`${p.x},${p.y},${p.z}`);

if(hit.object.material.color.getHex()==0x888888) inv.stone++;
if(hit.object.material.color.getHex()==0x00ffff) inv.crystal++;

updateUI();
});

function updateUI(){
blocks.innerText=world.size;
stone.innerText=inv.stone;
crystal.innerText=inv.crystal;
}

let keys={};
onkeydown=e=>keys[e.code]=true;
onkeyup=e=>keys[e.code]=false;

function animate(){
requestAnimationFrame(animate);

if(keys["KeyW"]) controls.moveForward(0.1);
if(keys["KeyS"]) controls.moveForward(-0.1);
if(keys["KeyA"]) controls.moveRight(-0.1);
if(keys["KeyD"]) controls.moveRight(0.1);

renderer.render(scene,camera);
}
animate();
</script>

</body>
</html>
